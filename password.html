<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePass - Advanced Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>Project 2 – Password Generator Website</header>

        <h2>SecurePass v1.0</h2>

        <div class="result-container">
            <span id="password-display">Click Generate -></span>
            <div id="copy-tooltip">Copied!</div>
            <button class="result-btn" id="copy-btn" title="Copy to Clipboard">📋</button>
        </div>

        <div class="options-container">
            <div class="length-slider-container">
                <label>Password Length: <span id="length-value">16</span></label>
                <input type="range" id="length" min="6" max="32" value="16">
            </div>

            <div class="option-item">
                <label for="numbers">Include Numbers (0-9)</label>
                <input type="checkbox" id="numbers" checked>
            </div>
            <div class="option-item">
                <label for="symbols">Include Symbols (@!$*)</label>
                <input type="checkbox" id="symbols" checked>
            </div>
            <div class="option-item">
                <label for="uppercase">Include Uppercase Letters (A-Z)</label>
                <input type="checkbox" id="uppercase" checked>
            </div>

            <div class="option-item" style="opacity: 0.5;">
                <label>Include Lowercase (a-z) (Required)</label>
                <input type="checkbox" checked disabled>
            </div>

            <div class="strength-container">
                <span id="strength-label">Strength:</span>
                <div id="strength-meter"><div id="strength-bar"></div></div>
                <span id="strength-text">N/A</span>
            </div>
        </div>

        <button class="generate-btn" id="generate-btn">Generate Password</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
